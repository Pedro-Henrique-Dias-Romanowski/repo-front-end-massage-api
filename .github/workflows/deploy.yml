name: Meri Terapias Integrativas e SPA - Web CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with Vite
        run: npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build Docker Images
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t ${{ secrets.DOCKER_USERNAME }}/web-massage:latest .

      - name: Tag Docker Images with Run ID
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/web-massage:latest ${{ secrets.DOCKER_USERNAME }}/web-massage:${{ github.run_id }}

      - name: Push Docker Images to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/web-massage:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/web-massage:${{ github.run_id }}
